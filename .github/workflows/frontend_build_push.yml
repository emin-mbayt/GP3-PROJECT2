name: FRONTEND PIPELINE - SonarQube, Docker Build

on:
  push:
    branches: ["main"]
    paths:
      - "frontend/**"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}-frontend
  cancel-in-progress: true

env:
  DOCKER_IMAGE_NAME: ${{ secrets.DOCKERHUB_USERNAME }}/gp3-front

jobs:
  sonarqube-analysis:
    runs-on: ubuntu-latest
    environment: env
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install Dependencies
        working-directory: frontend
        run: npm ci

      - name: Run Tests with Coverage
        working-directory: frontend
        run: npm run test:coverage

      - name: Cache SonarQube packages
        uses: actions/cache@v4
        with:
          path: ~/.sonar/cache
          key: ${{ runner.os }}-sonar
          restore-keys: ${{ runner.os }}-sonar

      - name: SonarQube Scan
        uses: SonarSource/sonarqube-scan-action@v2
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN2 }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
        with:
          projectBaseDir: frontend

  build-and-push-docker:
    needs: sonarqube-analysis
    runs-on: ubuntu-latest
    environment: env
    steps:
      - name: Clean Workspace Before Checkout
        run: git clean -fdx || true

      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: |
            ${{ env.DOCKER_IMAGE_NAME }}:${{ github.sha }}
            ${{ env.DOCKER_IMAGE_NAME }}:latest
          build-args: |
            VITE_API_BASE_URL=${{ secrets.VITE_API_BASE_URL }}
          cache-from: type=registry,ref=${{ env.DOCKER_IMAGE_NAME }}:buildcache
          cache-to: type=registry,ref=${{ env.DOCKER_IMAGE_NAME }}:buildcache,mode=max

      - name: Prune Docker System
        run: docker system prune -af

  deploy:
    needs: build-and-push-docker
    runs-on: ubuntu-latest
    environment: env
    steps:
      - name: Deploy to vm-web via Ansible
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VM_OPS_HOST }}
          username: azureuser
          password: ${{ secrets.VM_OPS_PASSWORD }}
          script: |
            echo "${{ secrets.ANSIBLE_VAULT_PASS }}" > /tmp/vp
            cd /home/azureuser/GP3-PROJECT2 && git pull
            cd config/ansible
            ansible-playbook playbooks/site.yml --limit web --vault-password-file /tmp/vp
            rm -f /tmp/vp
            rm -f /tmp/vp
