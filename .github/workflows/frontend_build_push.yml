name: FRONTEND PIPELINE - SonarQube, Docker Build & Azure Deploy

on:
  push:
    branches: [ "main" ]
    paths:
      - 'frontend/**'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}-frontend
  cancel-in-progress: true

env:
  DOCKER_IMAGE_NAME: ${{ secrets.DOCKERHUB_USERNAME }}/BIZIM-REPO-ADMIZ-FRONTEND
  AZURE_WEBAPP_NAME: 'BIZIM-WEBAPP-ADMIZ'
  AZURE_RESOURCE_GROUP: 'senin-resource-group-adin'

jobs:

  # 0. AŞAMA: HIZLI HATA YAKALAMA (FAIL-FAST)
  lint-and-typecheck:
    runs-on: ubuntu-latest # Bu işlem çok hafif olduğu için senin VM'ini yormamak adına GitHub sunucularında çalıştırıyoruz
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # Frontend ortamını (Node.js) ayağa kaldırıyoruz
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20' # Projende kullandığın Node sürümüne göre değiştirebilirsin
          cache: 'npm' # Bir sonraki çalışmalarda paket yükleme süresini saniyelere indirir
          cache-dependency-path: './frontend/package-lock.json'

      # Bağımlılıkları kur (Monorepo olduğu için working-directory belirtmek zorundayız)
      - name: Install Dependencies
        working-directory: ./frontend
        run: npm ci # Best Practice: 'npm install' yerine CI ortamlarında her zaman kilitli versiyonları kuran 'npm ci' kullanılır.

      # ESLint ile kod standartlarını kontrol et
      - name: Run ESLint
        working-directory: ./frontend
        run: npm run lint

      # TypeScript tiplerini kontrol et (Kodu derlemeden sadece hata var mı diye bakar)
      - name: Check TypeScript Types
        working-directory: ./frontend
        run: npx tsc --noEmit
  # 1. AŞAMA: KOD KALİTESİ VE GÜVENLİK
  sonarqube-analysis:
    needs: lint-and-typecheck # Önceki aşamada kritik hatalar varsa bu aşamaya geçilmez, böylece kaynaklarımızı boşa harcamayız
    runs-on: self-hosted
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: SonarQube Scan
        uses: SonarSource/sonarqube-scan-action@v2
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          # VM içinde de olsa, esneklik için secret kullanmak daha profesyoneldir
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
        with:
          projectBaseDir: frontend

      # KRİTİK EKLENTİ: Quality Gate. Kod standartların altındaysa pipeline burada patlar, bozuk kod deploy edilmez.
      - name: SonarQube Quality Gate Check
        uses: SonarSource/sonarqube-quality-gate-action@v1
        timeout-minutes: 5
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

  # 2. AŞAMA: DOCKER BUILD & PUSH
  build-and-push-docker:
    needs: [sonarqube-analysis, lint-and-typecheck]
    runs-on: self-hosted
    steps:
      # İYİLEŞTİRME: rm -rf yerine Git'in kendi güvenli temizlik aracını kullanıyoruz.
      - name: Clean Workspace Before Checkout
        run: git clean -fdx || true

      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # İYİLEŞTİRME: 'cache-from' ve 'cache-to' ile build sürelerini ciddi oranda kısaltıyoruz.
      - name: Build and Push Docker Image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: |
            ${{ env.DOCKER_IMAGE_NAME }}:${{ github.sha }}
            ${{ env.DOCKER_IMAGE_NAME }}:latest
          build-args: |
            VITE_API_BASE_URL=${{ secrets.VITE_API_BASE_URL }}

          cache-from: type=registry,ref=${{ env.DOCKER_IMAGE_NAME }}:buildcache
          cache-to: type=registry,ref=${{ env.DOCKER_IMAGE_NAME }}:buildcache,mode=max

      - name: Prune Docker System
        run: docker system prune -af

  # 3. AŞAMA: AZURE DEPLOYMENT
  deploy-to-azure:
    needs: build-and-push-docker
    runs-on: ubuntu-latest
    steps:
      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      # KRİTİK EKLENTİ: Private Registry Auth ve Restart komutları birleştirildi.
      - name: Deploy and Restart Azure Web App
        run: |
          az webapp config container set \
            --name ${{ env.AZURE_WEBAPP_NAME }} \
            --resource-group ${{ env.AZURE_RESOURCE_GROUP }} \
            --docker-custom-image-name ${{ env.DOCKER_IMAGE_NAME }}:${{ github.sha }} \
            --docker-registry-server-url https://index.docker.io \
            --docker-registry-server-user ${{ secrets.DOCKERHUB_USERNAME }} \
            --docker-registry-server-password ${{ secrets.DOCKERHUB_TOKEN }}

          # App Service'in yeni imajı hemen çekmeye zorlanması
          az webapp restart \
            --name ${{ env.AZURE_WEBAPP_NAME }} \
            --resource-group ${{ env.AZURE_RESOURCE_GROUP }}