name: Backend CI/CD Pipeline

on:
  push:
    branches: [ "main" ]
    paths:
      - 'backend/**'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  DOCKER_IMAGE_NAME: ${{ secrets.DOCKERHUB_USERNAME }}/senin-backend-imajin
  AZURE_WEBAPP_NAME: 'senin-azure-backend-app-adin'
  AZURE_RESOURCE_GROUP: 'senin-resource-group-adin' # az CLI komutları için Resource Group gerekli

jobs:
  # 1. AŞAMA: KOD KALİTESİ (Senin VM'inde çalışır)
  sonarqube-analysis:
    runs-on: self-hosted
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: SonarQube Scan
        uses: SonarSource/sonarqube-scan-action@v2
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: 'http://localhost:9000'
        with:
          projectBaseDir: backend

  # 2. AŞAMA: DOCKER BUILD & PUSH (Senin VM'inde çalışır)
  build-and-push-docker:
    needs: sonarqube-analysis
    runs-on: self-hosted
    steps:
      - name: Clean Workspace Before Checkout
        run: sudo rm -rf ${{ github.workspace }}/*

      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: |
            ${{ env.DOCKER_IMAGE_NAME }}:${{ github.sha }}
            ${{ env.DOCKER_IMAGE_NAME }}:latest

      - name: Prune Docker System
        run: docker system prune -af

  # 3. AŞAMA: AZURE DEPLOYMENT (Service Principal ile)
  deploy-to-azure:
    needs: build-and-push-docker
    runs-on: ubuntu-latest 
    steps:
      # 1. Adım: Service Principal ile Azure'a Giriş Yap
      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      # 2. Adım: Yeni İmajı Web App'e Bildir ve Yeniden Başlat
      - name: Deploy Container to Azure Web App
        run: |
          az webapp config container set \
            --name ${{ env.AZURE_WEBAPP_NAME }} \
            --resource-group ${{ env.AZURE_RESOURCE_GROUP }} \
            --docker-custom-image-name ${{ env.DOCKER_IMAGE_NAME }}:${{ github.sha }}