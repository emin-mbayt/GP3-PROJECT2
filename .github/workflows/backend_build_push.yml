name: BACKEND PIPELINE - SonarQube, Docker Build & Azure Deploy

on:
  push:
    branches: [ "main" ]
    paths:
      - 'backend/**'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}-backend
  cancel-in-progress: true

env:
  DOCKER_IMAGE_NAME: ${{ secrets.DOCKERHUB_USERNAME }}/gp3

jobs:
  # 1. AŞAMA: KOD KALİTESİ VE GÜVENLİK
  sonarqube-analysis:
    runs-on: ubuntu-latest
    environment: env
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Cache SonarQube packages
        uses: actions/cache@v4
        with:
          path: ~/.sonar/cache
          key: ${{ runner.os }}-sonar
          restore-keys: ${{ runner.os }}-sonar

      - name: Build, Test and Analyze
        working-directory: backend
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
        run: mvn -B verify org.sonarsource.scanner.maven:sonar-maven-plugin:sonar -Dsonar.projectKey=gp3-project2 -Dsonar.projectName='gp3-project2' -Dsonar.qualitygate.wait=true

  # 2. AŞAMA: DOCKER BUILD & PUSH
  build-and-push-docker:
    needs: sonarqube-analysis
    runs-on: ubuntu-latest
    environment: env
    steps:
      # İYİLEŞTİRME: rm -rf yerine Git'in kendi güvenli temizlik aracını kullanıyoruz.
      - name: Clean Workspace Before Checkout
        run: git clean -fdx || true

      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # İYİLEŞTİRME: 'cache-from' ve 'cache-to' ile build sürelerini ciddi oranda kısaltıyoruz.
      - name: Build and Push Docker Image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: |
            ${{ env.DOCKER_IMAGE_NAME }}:${{ github.sha }}
            ${{ env.DOCKER_IMAGE_NAME }}:latest
          cache-from: type=registry,ref=${{ env.DOCKER_IMAGE_NAME }}:buildcache
          cache-to: type=registry,ref=${{ env.DOCKER_IMAGE_NAME }}:buildcache,mode=max

      - name: Prune Docker System
        run: docker system prune -af

  deploy:
    needs: build-and-push-docker
    runs-on: ubuntu-latest
    environment: env
    steps:
      - name: Deploy to vm-api via Ansible
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VM_OPS_HOST }}
          username: azureuser
          password: ${{ secrets.VM_OPS_PASSWORD }}
          script: |
            echo "${{ secrets.ANSIBLE_VAULT_PASS }}" > /tmp/vp
            cd /home/azureuser/config/ansible
            ansible-playbook playbooks/site.yml --limit api --vault-password-file /tmp/vp
            rm -f /tmp/vp
